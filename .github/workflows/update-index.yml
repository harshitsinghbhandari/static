name: Update Index

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '**.pdf'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    # Skip when the Actions bot itself pushes (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Add new HTML/PDF files to index.html
        run: |
          set -euo pipefail

          # Get only files that were *added* in this push (status A)
          # Exclude index.html itself
          added=$(git diff --name-status HEAD^1 HEAD \
            | awk '/^A\t/ {print $2}' \
            | grep -E '\.(html|pdf)$' \
            | grep -v '^index\.html$' || true)

          if [ -z "$added" ]; then
            echo "No new HTML/PDF files added – nothing to do."
            exit 0
          fi

          changed=false

          while IFS= read -r file; do
            # Skip if already present in index.html
            if grep -qF "href=\"$file\"" index.html; then
              echo "Already indexed: $file"
              continue
            fi

            # Create human-readable display name (pure Bash, no Python)
            # Example: "my-awesome-page.html" → "My Awesome Page"
            display=$(basename "${file%.*}" | tr '_-' ' ' | sed 's/\b\(.\)/\u\1/g')

            # Insert new <li> just before </ul> (very robust)
            sed -i "/<\/ul>/i \  <li><a href=\"$file\">$display</a></li>" index.html

            echo "Indexed: $file → $display"
            changed=true
          done <<< "$added"

          # Only commit if we actually made changes
          if [ "$changed" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: update index.html with new files [skip ci]"
            git push
          fi
